name: Build and Release

# Build the standalone .exe automatically when a version tag is pushed,
# attach it to the GitHub Release, and publish SHA-256 checksums.
# This proves the .exe is reproducibly built from the tagged source.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source at tag
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --name FCInventoryTool `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "CHANGELOG.md;." `
            --add-data "LICENSE;." `
            --add-data "README.md;." `
            --hidden-import waitress `
            --collect-submodules waitress `
            app.py

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release zip
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          Compress-Archive -Path "dist/FCInventoryTool" -DestinationPath "FCInventoryTool-$tag-windows.zip" -Force
          Get-FileHash "FCInventoryTool-$tag-windows.zip" -Algorithm SHA256 | Format-List

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $zipHash = (Get-FileHash "FCInventoryTool-$tag-windows.zip" -Algorithm SHA256).Hash.ToLower()
          $exeHash = (Get-FileHash "dist/FCInventoryTool/FCInventoryTool.exe" -Algorithm SHA256).Hash.ToLower()
          @"
          FC Inventory Tool $tag - SHA-256 Checksums
          ===========================================
          Built by GitHub Actions from commit $env:GITHUB_SHA

          $zipHash  FCInventoryTool-$tag-windows.zip
          $exeHash  FCInventoryTool.exe
          "@ | Out-File -FilePath "SHA256SUMS-$tag.txt" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FCInventoryTool-${{ steps.version.outputs.tag }}
          path: |
            FCInventoryTool-*.zip
            SHA256SUMS-*.txt
          retention-days: 90

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FCInventoryTool-*.zip
            SHA256SUMS-*.txt
          generate_release_notes: false
          fail_on_unmatched_files: true
