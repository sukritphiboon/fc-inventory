<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's New - FC Inventory Tool</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .changelog-container {
            max-width: 760px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            padding: 40px;
        }
        .changelog-container h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .changelog-container .version-tag {
            display: inline-block;
            background: #2980b9;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        #changelog-content {
            margin-top: 24px;
            font-family: ui-monospace, "SF Mono", Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #34495e;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 65vh;
            overflow-y: auto;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ecf0f1;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2980b9;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="changelog-container">
        <h1>What's New <span class="version-tag">v{{ version }}</span></h1>
        <p class="subtitle">Release notes and version history</p>
        <div id="changelog-content">Loading...</div>
        <a href="/" class="back-link">&larr; Back to FC Inventory Tool</a>
    </div>

    <script>
        fetch("/api/changelog")
            .then(r => r.text())
            .then(text => {
                document.getElementById("changelog-content").textContent = text;
            })
            .catch(err => {
                document.getElementById("changelog-content").textContent =
                    "Failed to load changelog: " + err;
            });
    </script>
</body>
</html>
